# Render Blueprint - ArtImageHub Backend
services:
  - type: web
    name: colorbyte-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # App
      - key: DEBUG
        value: "false"
      # AI Provider: replicate for production
      - key: AI_PROVIDER
        value: replicate
      # Frontend URL for CORS and checkout return URLs
      - key: FRONTEND_URL
        value: https://www.artimagehub.com
      # Replicate AI (required when AI_PROVIDER=replicate)
      - key: REPLICATE_API_TOKEN
        sync: false  # Set in Render dashboard (sensitive)
      # Dodo Payments (primary one-time checkout provider)
      - key: DODO_PAYMENTS_API_KEY
        sync: false  # Set in Render dashboard (sensitive)
      - key: DODO_PAYMENTS_WEBHOOK_KEY
        sync: false  # Set in Render dashboard (sensitive)
      - key: DODO_PAYMENTS_ENVIRONMENT
        value: live_mode
      - key: DODO_PAYMENTS_PRODUCT_ID
        sync: false  # Set in Render dashboard (sensitive)
      - key: DODO_PAYMENTS_PRICE_USD
        value: "4.99"
      - key: DODO_PAYMENTS_CURRENCY
        value: USD

      # PayPal Payment (legacy fallback)
      - key: PAYPAL_CLIENT_ID
        sync: false  # Set in Render dashboard (sensitive)
      - key: PAYPAL_CLIENT_SECRET
        sync: false  # Set in Render dashboard (sensitive)
      - key: PAYPAL_MODE
        value: live
      - key: PAYPAL_WEBHOOK_ID
        sync: false  # Set in Render dashboard (sensitive)
      - key: PAYPAL_PRICE_USD
        value: "4.99"
      # LemonSqueezy Payment (legacy)
      - key: LEMONSQUEEZY_API_KEY
        sync: false  # Set in Render dashboard (sensitive)
      - key: LEMONSQUEEZY_STORE_ID
        value: "295039"
      - key: LEMONSQUEEZY_VARIANT_ID
        value: "1317124"
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false  # Set in Render dashboard (sensitive)
      - key: TRIAL_DAYS
        value: "7"
      # Database path (WARNING: ephemeral on free tier - upgrade to paid for persistence)
      - key: DATABASE_PATH
        value: data/artimagehub.db
    healthCheckPath: /health
