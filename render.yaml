# Render Blueprint - ArtImageHub Backend
services:
  - type: web
    name: colorbyte-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # App
      - key: DEBUG
        value: "false"
      # AI Provider: replicate for production
      - key: AI_PROVIDER
        value: replicate
      # Frontend URL for CORS and PayPal return URLs
      - key: FRONTEND_URL
        value: https://www.artimagehub.com
      # Replicate AI (required when AI_PROVIDER=replicate)
      - key: REPLICATE_API_TOKEN
        sync: false  # Set in Render dashboard (sensitive)
      # PayPal Payment (primary payment provider)
      - key: PAYPAL_CLIENT_ID
        sync: false  # Set in Render dashboard (sensitive)
      - key: PAYPAL_CLIENT_SECRET
        sync: false  # Set in Render dashboard (sensitive)
      - key: PAYPAL_MODE
        value: live
      - key: PAYPAL_WEBHOOK_ID
        sync: false  # Set in Render dashboard (sensitive)
      - key: PAYPAL_PRICE_USD
        value: "4.99"
      # LemonSqueezy Payment (legacy)
      - key: LEMONSQUEEZY_API_KEY
        sync: false  # Set in Render dashboard (sensitive)
      - key: LEMONSQUEEZY_STORE_ID
        value: "295039"
      - key: LEMONSQUEEZY_VARIANT_ID
        value: "1317124"
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false  # Set in Render dashboard (sensitive)
      - key: TRIAL_DAYS
        value: "7"
      # Database path (WARNING: ephemeral on free tier - upgrade to paid for persistence)
      - key: DATABASE_PATH
        value: data/artimagehub.db
      # Durable payment metrics store
      - key: METRICS_DATABASE_URL
        fromDatabase:
          name: colorbyte-metrics
          property: connectionString
    healthCheckPath: /health

databases:
  - name: colorbyte-metrics
    plan: free
    region: oregon
    databaseName: colorbyte_metrics
    user: colorbyte_metrics_user
