name: Keep Render alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:         # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf https://colorbyte-api.onrender.com/health \
            -o /dev/null \
            --max-time 30 \
            && echo "OK" \
            || echo "WARN: health check returned non-2xx (service may be cold-starting)"
